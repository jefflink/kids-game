<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%}
body{
  background: #fff9f0;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;

}
@keyframes pop{from{opacity:0;transform:scale(0.82) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

<body>
<div id="root"></div>

<!--
  ═══════════════════════════════════════════════════════════════════
  HANZI RECOGNITION ENGINE  v4.0
  ───────────────────────────────────────────────────────────────────
  Key improvement over v3: strokes are split at direction-change
  INFLECTION POINTS before comparison. An L-shaped stroke becomes
  [horizontal segment, vertical segment] — so 山, 口, 月, 子 etc.
  are correctly handled without any guessing.

  Algorithm:
    1. Resample drawn stroke to 24 evenly-spaced points
    2. Detect direction changes > 35° → split into sub-segments
    3. Describe each segment as [direction, length, centerX, centerY]
    4. Normalize bounding box across all strokes
    5. Score each DB entry: compare segment lists per stroke,
       penalise stroke-count mismatch

  PUBLIC API  (window.HanziEngine is set synchronously):
    window.HanziEngine.recognize(strokes, topN=8)
    → [{char, score, pinyin, meaning, hsk}]  sorted best-first

    strokes : Array<Array<[x,y]>>  — one inner array per drawn stroke
    score   : 0–1 confidence

  EVENT:
    document.addEventListener('hanzi:result', e => {
      const [best] = e.detail;
    });
  ═══════════════════════════════════════════════════════════════════
-->

<!-- ═══ ENGINE — plain JS, runs synchronously before React ════════ -->
<!--
  CHAR_DB is loaded from chinese-words.json at startup.
  To change which characters are available:
    1. Edit word-list.json
    2. Run: python3 build_words.py
    3. Reload this page.
-->
<script>
let CHAR_DB = [];  // populated by loadDB() below

// ── Geometry ─────────────────────────────────────────────────────────────────
const TAU = Math.PI * 2;
const normA = a => { a = a % TAU; return a < 0 ? a + TAU : a; };
const aDiff = (a,b) => { let d=Math.abs(normA(a)-normA(b)); return d>Math.PI?TAU-d:d; };

function resample(pts, n=32) {
  if (pts.length < 2) return pts;
  const tot = pts.reduce((s,p,i)=>i===0?0:s+Math.hypot(p[0]-pts[i-1][0],p[1]-pts[i-1][1]),0);
  if (tot===0) return Array(n).fill(pts[0]);
  const step=tot/(n-1); const out=[pts[0]]; let acc=0,prev=pts[0];
  for (let i=1; i<pts.length && out.length<n; i++) {
    let d=Math.hypot(pts[i][0]-prev[0],pts[i][1]-prev[1]);
    while (acc+d>=step && out.length<n) {
      const t=d>0?(step-acc)/d:0;
      const p=[prev[0]+t*(pts[i][0]-prev[0]),prev[1]+t*(pts[i][1]-prev[1])];
      out.push(p); prev=p; d=Math.hypot(pts[i][0]-prev[0],pts[i][1]-prev[1]); acc=0;
    }
    acc+=d; prev=pts[i];
  }
  while (out.length<n) out.push(pts[pts.length-1]);
  return out;
}

function normalizeBB(strokes) {
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for (const s of strokes) for (const p of s) {
    if(p[0]<x0)x0=p[0];if(p[1]<y0)y0=p[1];if(p[0]>x1)x1=p[0];if(p[1]>y1)y1=p[1];
  }
  const sc=Math.max(x1-x0,y1-y0)||1;
  return strokes.map(s=>s.map(p=>[(p[0]-x0)/sc,(p[1]-y0)/sc]));
}

const INFLECT_STEP  = Math.PI * 0.20;
const INFLECT_CUMUL = Math.PI * 0.55;

function splitAtInflections(pts) {
  const r = resample(pts, 32);
  if (r.length < 3) return [r];
  const dirs = [];
  for (let i=0; i<r.length-1; i++)
    dirs.push(Math.atan2(r[i+1][1]-r[i][1], r[i+1][0]-r[i][0]));
  const splits = [0]; let cumul = 0;
  for (let i=1; i<dirs.length; i++) {
    let diff = Math.abs(normA(dirs[i])-normA(dirs[i-1]));
    if (diff > Math.PI) diff = TAU - diff;
    cumul += diff;
    if (diff > INFLECT_STEP || cumul > INFLECT_CUMUL) { splits.push(i); cumul=0; }
  }
  splits.push(r.length-1);
  const segs = [];
  for (let i=0; i<splits.length-1; i++) {
    const seg = r.slice(splits[i], splits[i+1]+1);
    if (seg.length >= 2) segs.push(seg);
  }
  return segs.length ? segs : [r];
}

function segDesc(pts) {
  const a=pts[0], b=pts[pts.length-1];
  return [
    normA(Math.atan2(b[1]-a[1], b[0]-a[0])),
    Math.hypot(b[0]-a[0], b[1]-a[1]),
    pts.reduce((s,p)=>s+p[0],0)/pts.length,
    pts.reduce((s,p)=>s+p[1],0)/pts.length
  ];
}

function analyzeQuery(strokes) {
  const norm = normalizeBB(strokes);
  return { sc: strokes.length, ss: norm.map(s => splitAtInflections(s).map(segDesc)) };
}

function matchSegLists(qs, es) {
  if (!qs.length || !es.length) return 0;
  let tot = 0;
  for (const [qd,ql,qx,qy] of qs) {
    let best=-1;
    for (const [ed,el,ex,ey] of es) {
      const s=Math.max(0,.50*(1-aDiff(qd,ed)/Math.PI)+.25*(1-Math.min(1,Math.abs(ql-el)))+.25*(1-Math.min(1,Math.hypot(qx-ex,qy-ey))));
      if(s>best)best=s;
    }
    tot+=best;
  }
  for (const [ed,el,ex,ey] of es) {
    let best=-1;
    for (const [qd,ql,qx,qy] of qs) {
      const s=Math.max(0,.50*(1-aDiff(qd,ed)/Math.PI)+.25*(1-Math.min(1,Math.abs(ql-el)))+.25*(1-Math.min(1,Math.hypot(qx-ex,qy-ey))));
      if(s>best)best=s;
    }
    tot+=best;
  }
  return tot/(qs.length+es.length);
}

function scoreEntry(q, e) {
  const n = Math.min(q.ss.length, e.ss.length);
  let tot = 0;
  for (let i=0; i<n; i++) tot += matchSegLists(q.ss[i], e.ss[i]);
  return (tot/n) * Math.max(0, 1 - 0.12*Math.abs(q.sc - e.sc));
}

function recognize(strokes, topN=8) {
  if (!strokes || strokes.length===0 || CHAR_DB.length===0) return [];
  const q = analyzeQuery(strokes);
  const results = [];
  for (const e of CHAR_DB) {
    if (Math.abs(e.sc - q.sc) > 2) continue;
    results.push({ char:e.char, score:scoreEntry(q,e), pinyin:e.py, meaning:e.mn, hsk:e.hsk });
  }
  results.sort((a,b)=>b.score-a.score);
  const top = results.slice(0, topN);
  document.dispatchEvent(new CustomEvent('hanzi:result', { detail: top }));
  return top;
}

// ── Load chinese-words.json ──────────────────────────────────────────────────
// Fires 'hanzi:ready' on document when done, or 'hanzi:error' on failure.
async function loadDB(url='chinese-words.json') {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    CHAR_DB = await r.json();
    document.dispatchEvent(new CustomEvent('hanzi:ready', { detail: { count: CHAR_DB.length } }));
    console.log(`HanziEngine: loaded ${CHAR_DB.length} characters from ${url}`);
  } catch(e) {
    console.error('HanziEngine: failed to load', url, e);
    document.dispatchEvent(new CustomEvent('hanzi:error', { detail: e.message }));
  }
}

window.HanziEngine = { recognize, loadDB };
loadDB();  // start loading immediately
</script>
<!-- ═══ END ENGINE ══════════════════════════════════════════════════ -->
<!-- ═══ END ENGINE ══════════════════════════════════════════════════ -->

<!-- React UI — only this block needs Babel -->
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

const COLORS=["#ff6b6b","#4ecdc4","#45b7d1","#f9ca24","#ff9f43","#a29bfe","#fd79a8","#00b894"];

function Canvas({strokes,onChange}){
  const ref=useRef(); const drawing=useRef(false); const cur=useRef([]);
  const dpr=useRef(window.devicePixelRatio||1);

  const resize=useCallback(()=>{
    const cv=ref.current; if(!cv)return;
    const r=cv.getBoundingClientRect();
    const d=window.devicePixelRatio||1; dpr.current=d;
    if(cv.width!==Math.round(r.width*d)||cv.height!==Math.round(r.height*d)){
      cv.width=Math.round(r.width*d); cv.height=Math.round(r.height*d);
    }
  },[]);

  const getPos=(e,cv)=>{
    const r=cv.getBoundingClientRect(),d=dpr.current;
    const s=e.touches?e.touches[0]:e;
    return [(s.clientX-r.left)*d,(s.clientY-r.top)*d];
  };

  const redraw=useCallback(()=>{
    const cv=ref.current; if(!cv)return;
    resize();
    const ctx=cv.getContext('2d');
    const W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1*dpr.current;ctx.setLineDash([6*dpr.current,6*dpr.current]);
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);
    ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.03)';ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(W,H);
    ctx.moveTo(W,0);ctx.lineTo(0,H);ctx.stroke();ctx.restore();
    strokes.forEach((s,i)=>{
      if(s.length<2)return;
      const col=COLORS[i%COLORS.length];
      ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=4*dpr.current;ctx.shadowOffsetY=2*dpr.current;
      ctx.beginPath();ctx.strokeStyle=col;
      ctx.lineWidth=8*dpr.current;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.moveTo(s[0][0],s[0][1]);s.forEach(([x,y])=>ctx.lineTo(x,y));ctx.stroke();
      ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      const R=16*dpr.current;
      ctx.fillStyle=col;ctx.beginPath();ctx.arc(s[0][0],s[0][1],R,0,TAU);ctx.fill();
      ctx.fillStyle='#fff';ctx.font=`bold ${R+2}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(i+1,s[0][0],s[0][1]);
    });
    if(cur.current.length>1){
      ctx.beginPath();ctx.strokeStyle='#ff6b6b';
      ctx.lineWidth=8*dpr.current;ctx.lineCap='round';
      ctx.moveTo(cur.current[0][0],cur.current[0][1]);
      cur.current.forEach(([x,y])=>ctx.lineTo(x,y));ctx.stroke();
    }
  },[strokes,resize]);

  useEffect(()=>{
    resize();
    const ro=new ResizeObserver(()=>{resize();redraw();});
    if(ref.current) ro.observe(ref.current);
    return()=>ro.disconnect();
  },[resize,redraw]);
  useEffect(redraw,[strokes,redraw]);

  useEffect(()=>{
    const cv=ref.current; if(!cv)return;
    const onTD=e=>{e.preventDefault();drawing.current=true;cur.current=[getPos(e,cv)];redraw();};
    const onTM=e=>{e.preventDefault();if(!drawing.current)return;cur.current.push(getPos(e,cv));redraw();};
    const onTU=e=>{
      e.preventDefault();if(!drawing.current)return;drawing.current=false;
      if(cur.current.length>2)onChange([...strokes,cur.current]);
      cur.current=[];redraw();
    };
    cv.addEventListener('touchstart',onTD,{passive:false});
    cv.addEventListener('touchmove',onTM,{passive:false});
    cv.addEventListener('touchend',onTU,{passive:false});
    return()=>{
      cv.removeEventListener('touchstart',onTD);
      cv.removeEventListener('touchmove',onTM);
      cv.removeEventListener('touchend',onTU);
    };
  },[strokes,onChange,redraw]);

  const onMD=e=>{drawing.current=true;cur.current=[getPos(e,ref.current)];redraw();};
  const onMM=e=>{if(!drawing.current)return;cur.current.push(getPos(e,ref.current));redraw();};
  const onMU=e=>{
    if(!drawing.current)return;drawing.current=false;
    if(cur.current.length>2)onChange([...strokes,cur.current]);
    cur.current=[];redraw();
  };

  return <canvas ref={ref}
    onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
    style={{touchAction:'none',cursor:'crosshair',display:'block',
            width:'100%',height:'100%',borderRadius:16,userSelect:'none'}}/>;
}

function Bar({v,color='#ff9f43'}){
  return <div style={{height:6,borderRadius:3,background:'rgba(0,0,0,0.08)',overflow:'hidden',width:'100%'}}>
    <div style={{height:'100%',borderRadius:3,width:`${Math.round(v*100)}%`,
      background:color,transition:'width 0.4s ease'}}/>
  </div>;
}

function App(){
  const [strokes,setStrokes]=useState([]);
  const [results,setResults]=useState([]);
  const [sel,setSel]=useState(null);
  const [animKey,setAnimKey]=useState(0);
  const [dbReady,setDbReady]=useState(false);
  const [dbCount,setDbCount]=useState(0);
  const [dbError,setDbError]=useState(null);

  useEffect(()=>{
    const onReady=e=>{ setDbReady(true); setDbCount(e.detail.count); };
    const onError=e=>{ setDbError(e.detail); };
    document.addEventListener('hanzi:ready', onReady);
    document.addEventListener('hanzi:error', onError);
    return()=>{
      document.removeEventListener('hanzi:ready', onReady);
      document.removeEventListener('hanzi:error', onError);
    };
  },[]);

  const onChange=useCallback(ss=>{
    setStrokes(ss);setSel(null);
    if(ss.length>0){setResults(window.HanziEngine.recognize(ss,8));setAnimKey(k=>k+1);}
  },[]);
  const undo=()=>{const s=strokes.slice(0,-1);setStrokes(s);setSel(null);setResults(s.length?window.HanziEngine.recognize(s,8):[]);};
  const clear=()=>{setStrokes([]);setResults([]);setSel(null);};
  const top=results[0];
  const scoreColor=v=>v>=0.7?'#00b894':v>=0.4?'#e67e22':'#e74c3c';

  return (
    <div style={{
      minHeight:'100vh',
      background:'linear-gradient(160deg,#fff9f0 0%,#ffeef8 50%,#eef6ff 100%)',
      display:'flex',flexDirection:'column',alignItems:'center',
      padding:'16px 14px 40px',overflowX:'hidden'
    }}>

      <div style={{textAlign:'center',marginBottom:14}}>
        <div style={{fontSize:20,marginBottom:4,letterSpacing:4}}>⭐🌟⭐</div>
        <h1 style={{
          margin:'0 0 2px',
          fontSize:'clamp(22px,6vw,34px)',fontWeight:900,
          background:'linear-gradient(135deg,#ff6b6b,#f9ca24,#4ecdc4)',
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',
          letterSpacing:'-0.5px',lineHeight:1.1
        }}>写汉字！</h1>
        <p style={{color:'#b0a0c8',fontSize:12,margin:0,fontWeight:500}}>
          Learn to write Chinese · HSK 1–4 ·{' '}
          {dbError
            ? <span style={{color:'#e74c3c'}}>⚠️ Failed to load characters</span>
            : dbReady
              ? <span>{dbCount} characters</span>
              : <span style={{color:'#f9ca24',animation:'float 1s ease-in-out infinite'}}>Loading…</span>
          }
        </p>
      </div>

      <div style={{
        width:'100%',maxWidth:560,
        background:'#fff',borderRadius:24,
        boxShadow:'0 8px 40px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06)',
        overflow:'hidden'
      }}>
        {/* Canvas */}
        <div style={{
          position:'relative',width:'100%',paddingBottom:'75%',
          background: dbReady ? '#fffdf9' : '#fdf8f2',
          borderBottom:'2px dashed #ffe4c4',
          transition:'background 0.3s'
        }}>
          {['tl','tr','bl','br'].map(p=>(
            <div key={p} style={{
              position:'absolute',
              top:p[0]==='t'?10:'auto',bottom:p[0]==='b'?10:'auto',
              left:p[1]==='l'?10:'auto',right:p[1]==='r'?10:'auto',
              width:8,height:8,borderRadius:'50%',background:'rgba(255,180,100,0.3)'
            }}/>
          ))}
          <div style={{position:'absolute',inset:0}}>
            <Canvas strokes={strokes} onChange={onChange}/>
          </div>
          {!dbReady && !dbError &&
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
              justifyContent:'center',background:'rgba(255,253,249,0.85)',borderRadius:14,
              flexDirection:'column',gap:8}}>
              <div style={{fontSize:32,animation:'float 1s ease-in-out infinite'}}>⏳</div>
              <div style={{fontSize:13,color:'#c9a882',fontWeight:600}}>Loading characters…</div>
            </div>
          }
          {dbError &&
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
              justifyContent:'center',background:'rgba(255,253,249,0.9)',borderRadius:14,
              flexDirection:'column',gap:8,padding:20,textAlign:'center'}}>
              <div style={{fontSize:32}}>😢</div>
              <div style={{fontSize:13,color:'#e74c3c',fontWeight:600}}>
                Could not load chinese-words.json
              </div>
              <div style={{fontSize:11,color:'#999'}}>
                Make sure chinese-words.json is in the same folder as hanzi-engine.html
              </div>
            </div>
          }
        </div>

        {/* Controls */}
        <div style={{
          display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'10px 16px',background:'#fff8f0',borderBottom:'1px solid #ffeedd'
        }}>
          <span style={{fontSize:12,color:'#c9a882',fontWeight:600}}>
            {strokes.length===0?'✏️  Start drawing!':`✏️  ${strokes.length} stroke${strokes.length!==1?'s':''}`}
          </span>
          <div style={{display:'flex',gap:8}}>
            <button onClick={undo} disabled={!strokes.length} style={{
              border:'2px solid #ffc3a0',background:strokes.length?'#fff4ee':'#fafafa',
              borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:700,
              cursor:strokes.length?'pointer':'not-allowed',
              color:strokes.length?'#ff7043':'#ccc',opacity:strokes.length?1:0.5,
              transition:'all 0.15s',WebkitTapHighlightColor:'transparent'
            }}>↩ Undo</button>
            <button onClick={clear} disabled={!strokes.length} style={{
              border:'2px solid #ffb3c1',background:strokes.length?'#fff0f3':'#fafafa',
              borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:700,
              cursor:strokes.length?'pointer':'not-allowed',
              color:strokes.length?'#e84393':'#ccc',opacity:strokes.length?1:0.5,
              transition:'all 0.15s',WebkitTapHighlightColor:'transparent'
            }}>✕ Clear</button>
          </div>
        </div>

        {/* Results */}
        <div style={{padding:'12px 16px 16px'}}>
          {!top
            ? <div style={{textAlign:'center',padding:'16px 0',color:'#d4b896'}}>
                <div style={{fontSize:32,marginBottom:6,animation:'float 2s ease-in-out infinite'}}>🖊️</div>
                <div style={{fontSize:14,fontWeight:600}}>Draw a character above!</div>
                <div style={{fontSize:11,marginTop:3,color:'#e0c8ac'}}>Try: 一 二 三 人 山 水 火 木</div>
              </div>
            : <>
                <div key={animKey} style={{
                  display:'flex',alignItems:'center',gap:12,
                  background:'linear-gradient(135deg,#fff9f0,#fff0fb)',
                  border:'2.5px solid #ffd6e7',borderRadius:18,padding:'10px 16px',
                  boxShadow:'0 4px 16px rgba(255,150,100,0.12)',
                  animation:'pop 0.3s cubic-bezier(.34,1.56,.64,1)'}}>
                  <div style={{
                    fontSize:56,lineHeight:1,fontWeight:900,flexShrink:0,
                    color:'#2d2d2d',textShadow:'3px 3px 0 rgba(255,150,50,0.2)',
                    userSelect:'none',animation:'wiggle 0.4s ease'
                  }}>{top.char}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
                      <span style={{fontSize:20,fontWeight:800,color:'#ff6b6b',lineHeight:1}}>{top.pinyin}</span>
                      <span style={{fontSize:10,fontWeight:700,color:'#fff',
                        background:'#a29bfe',borderRadius:8,padding:'1px 7px'}}>HSK {top.hsk}</span>
                    </div>
                    <div style={{fontSize:13,color:'#666',marginTop:3,
                      overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{top.meaning}</div>
                    <div style={{marginTop:6,display:'flex',alignItems:'center',gap:8}}>
                      <div style={{flex:1}}><Bar v={top.score} color={scoreColor(top.score)}/></div>
                      <span style={{fontSize:12,fontWeight:700,color:scoreColor(top.score),flexShrink:0}}>
                        {Math.round(top.score*100)}%
                      </span>
                    </div>
                  </div>
                </div>

                {results.length>1 &&
                  <div style={{display:'flex',gap:7,marginTop:10,overflowX:'auto',
                    paddingBottom:4,WebkitOverflowScrolling:'touch'}}>
                    {results.slice(1).map((r,i)=>{
                      const active=sel?.char===r.char;
                      return(
                        <button key={i} onClick={()=>setSel(active?null:r)} style={{
                          flexShrink:0,display:'flex',alignItems:'center',gap:6,
                          background:active?'#fff0f8':'#f9f9f9',
                          border:`2px solid ${active?'#fd79a8':'#eee'}`,
                          borderRadius:20,padding:'5px 12px 5px 8px',
                          cursor:'pointer',transition:'all 0.15s',
                          boxShadow:active?'0 2px 8px rgba(253,121,168,0.25)':'none',
                          WebkitTapHighlightColor:'transparent'}}>
                          <span style={{fontSize:22,color:'#2d2d2d',lineHeight:1}}>{r.char}</span>
                          <span style={{fontSize:10,color:'#999',lineHeight:1.4,textAlign:'left'}}>
                            {r.pinyin}<br/>
                            <span style={{color:scoreColor(r.score),fontWeight:700}}>{Math.round(r.score*100)}%</span>
                          </span>
                        </button>
                      );
                    })}
                  </div>
                }

                {sel &&
                  <div style={{
                    marginTop:8,padding:'8px 14px',background:'#fff5ff',borderRadius:12,
                    border:'2px solid #e8d5ff',display:'flex',alignItems:'center',gap:10,
                    animation:'pop 0.2s ease'}}>
                    <span style={{fontSize:28,color:'#2d2d2d'}}>{sel.char}</span>
                    <div>
                      <span style={{fontSize:16,fontWeight:700,color:'#a29bfe'}}>{sel.pinyin}</span>
                      <span style={{fontSize:11,color:'#888',marginLeft:8}}>{sel.meaning}</span>
                    </div>
                    <span style={{marginLeft:'auto',fontSize:10,fontWeight:700,color:'#fff',
                      background:'#a29bfe',borderRadius:8,padding:'2px 8px',flexShrink:0}}>
                      HSK {sel.hsk}
                    </span>
                  </div>
                }
              </>
          }
        </div>
      </div>

      <div style={{marginTop:16,fontSize:11,color:'#d4c4b0',textAlign:'center'}}>
        汉字识别引擎 · Stroke-based recognition · GitHub Pages ready
      </div>

      <style>{`
        @keyframes pop{from{opacity:0;transform:scale(0.82) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        button:active{transform:scale(0.94)}
        body{overscroll-behavior:none}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
