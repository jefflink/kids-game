<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Daniel's Fishing Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1628;overflow:hidden;width:100vw;height:100vh;font-family:Arial,sans-serif;touch-action:none;user-select:none}
#c{display:block;position:absolute;top:0;left:0}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 10px;z-index:5;pointer-events:none}
.hb{background:rgba(0,20,50,0.85);border:2px solid rgba(100,200,255,0.5);border-radius:14px;padding:4px 12px;color:#7df3ff;font-size:15px;font-weight:bold}
#zone{position:fixed;top:50px;left:50%;transform:translateX(-50%);color:rgba(125,243,255,0.8);font-size:11px;font-weight:bold;z-index:5;pointer-events:none;white-space:nowrap}
#dm{position:fixed;right:10px;top:60px;width:20px;height:160px;background:rgba(0,0,0,0.5);border:2px solid rgba(100,200,255,0.3);border-radius:10px;overflow:hidden;z-index:5}
#df{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#7df3ff,#1a6b8a);transition:height .3s}
#dl{position:fixed;right:4px;top:226px;color:#7df3ff;font-size:9px;text-align:center;z-index:5;width:36px}
#btns{position:fixed;bottom:14px;left:10px;display:flex;gap:8px;z-index:5}
.cb{width:52px;height:52px;border-radius:50%;background:rgba(0,20,50,0.85);border:2px solid rgba(100,200,255,0.4);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
#colBtn{position:fixed;bottom:14px;right:10px;background:linear-gradient(135deg,#ff9f43,#ee5a24);border:none;border-radius:30px;padding:10px 14px;font-size:14px;font-weight:bold;color:#fff;cursor:pointer;z-index:5}
#hs{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:rgba(0,20,50,0.85);border:2px solid rgba(255,215,0,0.4);border-radius:30px;padding:4px 14px;color:#FFD700;font-size:13px;font-weight:bold;z-index:5;white-space:nowrap;display:flex;align-items:center;gap:8px}
#ngBtn{background:rgba(255,215,0,0.15);border:1px solid #FFD700;border-radius:14px;padding:2px 10px;color:#FFD700;font-size:12px;font-weight:bold;cursor:pointer}
#hint{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:rgba(0,20,50,0.85);border:2px solid rgba(100,200,255,0.4);border-radius:20px;padding:7px 18px;color:#fff;font-size:15px;font-weight:bold;z-index:6;transition:opacity .5s;pointer-events:none}
#popup{position:fixed;top:65px;left:50%;transform:translateX(-50%) translateY(-80px);opacity:0;background:rgba(5,15,40,0.95);border:2px solid #7df3ff;border-radius:16px;padding:8px 16px;z-index:10;display:flex;align-items:center;gap:10px;transition:all .3s;pointer-events:none;white-space:nowrap}
#popup.show{transform:translateX(-50%) translateY(0);opacity:1}
#popup canvas{display:block}
#pname{color:#fff;font-size:12px}
#ppts{color:#FFD700;font-size:18px;font-weight:bold}
#pnew{background:#FFD700;color:#000;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:bold;display:none}
#colModal{position:fixed;inset:0;background:rgba(0,0,10,0.92);z-index:20;display:none;flex-direction:column;align-items:center;padding:14px 8px;overflow-y:auto}
#colModal.open{display:flex}
#colModal h1{color:#7df3ff;font-size:22px;margin-bottom:2px}
#colSub{color:#888;font-size:12px;margin-bottom:10px}
#colGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:7px;width:100%;max-width:560px}
.fc{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:7px 3px;text-align:center}
.fc.got{border-color:rgba(125,243,255,0.5)}
.fc canvas{display:block;margin:0 auto 2px}
.fn{font-size:8px;color:#ccc;font-weight:bold}
.fp{font-size:9px;color:#FFD700;font-weight:bold}
#closeCol{margin-top:14px;background:rgba(26,107,138,0.5);border:2px solid #7df3ff;border-radius:30px;padding:8px 24px;color:#7df3ff;font-size:16px;font-weight:bold;cursor:pointer}
#start{position:fixed;inset:0;background:linear-gradient(180deg,#87CEEB,#1a6b8a 50%,#0a1628);z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#start h1{font-size:32px;font-weight:bold;color:#fff;text-align:center;text-shadow:0 3px 12px rgba(0,0,0,0.4)}
#start p{color:#c8ecff;font-size:14px;text-align:center;padding:0 24px;line-height:1.5}
#startBtn{background:linear-gradient(135deg,#FFD700,#ff9f43);border:none;border-radius:40px;padding:12px 36px;font-size:20px;font-weight:bold;color:#000;cursor:pointer}
</style>
</head>

</div>

// ---- CANVAS + STATE ----
var canvas = document.getElementById("c");
var ctx = canvas.getContext("2d");
var W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

var M2PX = 2;          // 1 meter = 2 px
var SINK  = 32;        // m/sec down
var REEL  = 64;        // m/sec up
var HRAT  = 0.62;      // hook screen position ratio
var WRAT  = 0.25;      // water surface ratio

var ZONES = [
  {m:0,    label:"Shallow Waters"},
  {m:100,  label:"Coastal Zone"},
  {m:300,  label:"Deep Sea"},
  {m:600,  label:"Twilight Zone"},
  {m:1000, label:"Midnight Zone"},
  {m:2000, label:"Abyssal Zone"},
  {m:4000, label:"Hadal Zone"},
  {m:6000, label:"Legendary Depths"}
];

function getZone(d) {
  for (var i = ZONES.length-1; i >= 0; i--) if (d >= ZONES[i].m) return ZONES[i].label;
  return ZONES[0].label;
}

function lsGet(k,def){ try{ return localStorage.getItem(k)||def; }catch(e){ return def; } }
function lsSet(k,v){   try{ localStorage.setItem(k,v); }catch(e){} }

var G = {
  phase: "idle",
  score: 0, hs: parseInt(lsGet("dfhs","0")),
  depth: 0, maxDep: 0, camDep: 0,
  bx: 0,       // hook x
  mdir: 0,     // move direction
  catchT: 0,   // catch cooldown
  spawnT: 0,   // spawn timer
  fishes: [], parts: [], bubbles: [],
  caught: {},  nCaught: 0,
  wt: 0,       // wave time
  waterY: 0, boatX: 0
};

function hookWY() { return G.depth * M2PX; }
function toScrY(wy) { return G.waterY + wy - G.camDep; }

// ---- SPAWN ----
function spawnBatch() {
  if (G.depth < 50) return;
  var screenM = (H - G.waterY) / M2PX;
  var lookM   = SINK * 5 * 3;
  var minDepth, maxDepth;

  if (G.phase === 'reeling') {
    minDepth = Math.max(10, G.depth - screenM * 2);
    maxDepth = Math.max(20, G.depth - screenM * 0.5);
  } else {
    minDepth = Math.max(50, G.depth + screenM * 0.5);
    maxDepth = G.depth + screenM + lookM;
  }

  if (maxDepth <= minDepth) return;

  var count = 36;
  var range = maxDepth - minDepth;
  // Divide the range into evenly-spaced slots, place one fish per slot
  var slotSize = range / count;

  for (var i = 0; i < count; i++) {
    // Each fish gets its own depth slot with a small random offset within it
    var slotStart = minDepth + i * slotSize;
    var depM = slotStart + Math.random() * slotSize * 0.8; // stays within slot
    depM = Math.max(50, depM);

    var pool = [];
    for (var j = 0; j < FISH.length; j++) {
      if (FISH[j].dep <= depM) pool.push(FISH[j]);
    }
    if (!pool.length) continue;
    pool.sort(function(a,b){ return b.dep - a.dep; });
    var pick = pool[Math.floor(Math.random() * Math.min(8, pool.length))];
    var spd  = (0.5 + Math.random() * pick.spd) * 26;
    G.fishes.push({
      fid: pick.id,
      x:   Math.random() * W,
      wy:  depM * M2PX,
      vx:  spd * (Math.random() < 0.5 ? 1 : -1),
      sz:  pick.sz * (0.85 + Math.random() * 0.3),
      wb:  Math.random() * Math.PI * 2,
      ws:  2 + Math.random() * 2,
      caught: false, alpha: 1
    });
  }
}

function addParticles(x, y, col) {
  for (var i = 0; i < 10; i++) {
    G.parts.push({x:x, y:y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-2,
      life:1, dec:0.03, r:3+Math.random()*4, col:col});
  }
}

function addBubbles(x, wy) {
  for (var i = 0; i < 3; i++) {
    G.bubbles.push({x:x+(Math.random()-0.5)*20, wy:wy,
      vy:-28-Math.random()*25, r:2+Math.random()*4, life:1, dec:0.01});
  }
}

// ---- DRAW ----
function drawSky() {
  // Sky gradient using fillRect bands (no createLinearGradient issues)
  var grad = ctx.createLinearGradient(0,0,0,G.waterY);
  grad.addColorStop(0, "#5BA3C9");
  grad.addColorStop(1, "#87CEEB");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, G.waterY);
  // Sun
  ctx.fillStyle = "rgba(255,240,80,0.9)";
  ctx.beginPath(); ctx.arc(W*0.82, G.waterY*0.22, 36, 0, Math.PI*2); ctx.fill();
  // Clouds
  [[W*0.15, G.waterY*0.3, 50],[W*0.55, G.waterY*0.18, 38],[W*0.38, G.waterY*0.5, 32]].forEach(function(c){
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath(); ctx.arc(c[0], c[1], c[2], 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c[0]+c[2]*0.6, c[1]-c[2]*0.2, c[2]*0.65, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c[0]-c[2]*0.55, c[1], c[2]*0.55, 0, Math.PI*2); ctx.fill();
  });
}

function drawWater() {
  G.wt += 0.02;
  var wY = G.waterY;
  var dr = Math.min(G.depth / 5000, 1);
  var r = Math.round(26 - dr*14), g2 = Math.round(107 - dr*75), b = Math.round(138 - dr*95);
  var grad = ctx.createLinearGradient(0, wY, 0, H);
  grad.addColorStop(0, "rgb("+r+","+g2+","+b+")");
  grad.addColorStop(1, "rgb(10,15,40)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, wY, W, H - wY);
  // Wave
  ctx.fillStyle = "rgba(135,206,235,0.25)";
  ctx.beginPath(); ctx.moveTo(0, wY);
  for (var x = 0; x <= W; x += 10) {
    ctx.lineTo(x, wY + Math.sin(x*0.022 + G.wt)*4 + Math.sin(x*0.055 + G.wt*1.5)*2);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  // Zone lines
  ctx.font = "11px Arial"; ctx.textAlign = "left";
  for (var i = 0; i < ZONES.length; i++) {
    var sy = toScrY(ZONES[i].m * M2PX);
    if (sy > wY && sy < H) {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1;
      ctx.setLineDash([8,12]);
      ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(W,sy); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.fillText(ZONES[i].label, 8, sy-4);
      ctx.restore();
    }
  }
}

function drawFishes() {
  ctx.save();
  // Hard clip — nothing renders above the water line
  ctx.beginPath();
  ctx.rect(0, G.waterY, W, H - G.waterY);
  ctx.clip();
  for (var i = 0; i < G.fishes.length; i++) {
    var f = G.fishes[i];
    var sy = toScrY(f.wy);
    if (sy < G.waterY || sy > H + 80) continue; // skip above water or far off bottom
    f.wb += f.ws / 60;
    var fd = FISH[f.fid];
    var dir = f.vx > 0 ? 1 : -1;
    ctx.globalAlpha = f.alpha;
    drawFish(ctx, fd, f.x, sy, f.sz, dir, f.wb);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawBubbles() {
  ctx.strokeStyle = "rgba(180,240,255,0.7)"; ctx.lineWidth = 1.2;
  for (var i = 0; i < G.bubbles.length; i++) {
    var b = G.bubbles[i];
    var sy = toScrY(b.wy);
    ctx.globalAlpha = b.life * 0.5;
    ctx.beginPath(); ctx.arc(b.x, sy, b.r, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (var i = 0; i < G.parts.length; i++) {
    var p = G.parts[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBoat() {
  var bx = G.boatX, by = G.waterY;
  var wave = Math.sin(G.wt) * 2.5;
  ctx.save(); ctx.translate(bx, by + wave);
  // Hull
  ctx.fillStyle = "#8B4513";
  ctx.beginPath();
  ctx.moveTo(-46,0); ctx.lineTo(-50,15); ctx.lineTo(50,15); ctx.lineTo(46,0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#A0522D"; ctx.fillRect(-42,-8,84,8);
  // Person body
  ctx.fillStyle = "#2ECC71"; ctx.fillRect(-8,-30,16,18);
  ctx.fillStyle = "#FDBCB4";
  ctx.beginPath(); ctx.arc(0,-36,9,0,Math.PI*2); ctx.fill();
  // Hat
  ctx.fillStyle = "#E67E22";
  ctx.beginPath();
  ctx.moveTo(-11,-42); ctx.lineTo(11,-42); ctx.lineTo(7,-53); ctx.lineTo(-7,-53);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#5D4037"; ctx.fillRect(-12,-44,24,3);
  // Rod
  ctx.strokeStyle = "#4A2800"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(8,-48); ctx.lineTo(40,-63); ctx.stroke();
  ctx.lineCap = "butt";
  ctx.restore();

  // Line + hook
  if (G.phase !== "idle") {
    var rtx = bx + 40, rty = by + wave - 63;
    var hookSY = toScrY(hookWY());
    ctx.strokeStyle = "rgba(255,255,255,0.65)"; ctx.lineWidth = 1.5;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(rtx, rty); ctx.lineTo(G.bx, hookSY); ctx.stroke();
    ctx.setLineDash([]);
    if (hookSY <= G.waterY + 3) {
      ctx.fillStyle = "#E74C3C";
      ctx.beginPath(); ctx.arc(G.bx, hookSY, 6, Math.PI, 0); ctx.fill();
      ctx.fillStyle = "#ECF0F1";
      ctx.beginPath(); ctx.arc(G.bx, hookSY, 6, 0, Math.PI); ctx.fill();
    } else {
      ctx.strokeStyle = "#BDC3C7"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(G.bx, hookSY, 4, 0, Math.PI*1.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(G.bx+4, hookSY); ctx.lineTo(G.bx+4, hookSY+4); ctx.stroke();
    }
  }
}

function updateHUD() {
  var d = Math.round(G.depth);
  document.getElementById("sc").textContent = Math.floor(G.score);
  document.getElementById("dl").textContent = d + "m";
  document.getElementById("df").style.height = Math.min(d/6000*100,100) + "%";
  document.getElementById("zone").textContent = getZone(d);
  if (G.score > G.hs) { G.hs = Math.floor(G.score); lsSet("dfhs", G.hs); }
  document.getElementById("hsv").textContent = G.hs;
}

// ---- COLLISION ----
function checkHit() {
  if (G.catchT > 0) return;
  var hookSY = toScrY(hookWY());
  for (var i = 0; i < G.fishes.length; i++) {
    var f = G.fishes[i];
    if (f.caught) continue;
    var sy = toScrY(f.wy);
    var dx = Math.abs(G.bx - f.x);
    var dy = Math.abs(hookSY - sy);
    // Fish sprites are ~1.5sz wide and ~sz tall — touch anywhere on body
    if (dx < f.sz * 1.5 && dy < f.sz * 0.9) {
      doCatch(f);
      return;
    }
  }
}

function doCatch(f) {
  f.caught = true;
  var fd = FISH[f.fid];
  var isNew = !G.caught[fd.id];
  if (isNew) { G.caught[fd.id] = true; G.nCaught++; document.getElementById("fc2").textContent = G.nCaught; }
  var pts = fd.pts + Math.floor(G.depth * 0.12);
  G.score += pts;
  var hookSY = toScrY(hookWY());
  addParticles(G.bx, hookSY, fd.c1);
  addBubbles(G.bx, hookWY());
  // Popup
  var pc = document.getElementById("pc");
  var pctx = pc.getContext("2d");
  pctx.clearRect(0,0,52,40);
  drawFish(pctx, fd, 26, 20, Math.min(fd.sz*0.75, 17), 1, Math.PI/10);
  document.getElementById("pname").textContent = fd.name;
  document.getElementById("ppts").textContent = "+" + pts + " pts!";
  document.getElementById("pnew").style.display = isNew ? "inline-block" : "none";
  var pop = document.getElementById("popup");
  pop.classList.add("show");
  G.catchT = 2;
  setTimeout(function(){ pop.classList.remove("show"); }, 2200);
  if (G.phase === "casting") G.phase = "reeling";
}

// ---- UPDATE ----
function update(dt) {
  G.waterY = H * WRAT;
  G.boatX  = W * 0.38;

  // Spawn timer
  if (G.phase === "casting" || G.phase === "reeling") {
    G.spawnT -= dt;
    if (G.spawnT <= 0) {
      spawnBatch();
      G.spawnT = G.phase === "reeling" ? 2.5 : 5;
    }
  }

  // Update fish
  for (var i = 0; i < G.fishes.length; i++) {
    var f = G.fishes[i];
    if (f.caught) {
      f.wy = hookWY();
      f.alpha = Math.max(0, f.alpha - 0.03);
    } else {
      f.x += f.vx * dt;
      if (f.x < -80)  f.vx =  Math.abs(f.vx);
      if (f.x > W+80) f.vx = -Math.abs(f.vx);
    }
  }
  // Cull
  var alive = [];
  for (var i = 0; i < G.fishes.length; i++) {
    var f = G.fishes[i];
    if (f.caught && f.alpha <= 0) continue;       // fully faded after catch
    var sy = toScrY(f.wy);
    if (!f.caught && sy < -150) continue;          // scrolled above screen, remove
    if (!f.caught && sy > H + 400) continue;       // too far below, remove
    alive.push(f);
  }
  G.fishes = alive;

  // Particles
  for (var i = 0; i < G.parts.length; i++) {
    var p = G.parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.dec;
  }
  G.parts = G.parts.filter(function(p){ return p.life > 0; });

  // Bubbles
  for (var i = 0; i < G.bubbles.length; i++) {
    var b = G.bubbles[i];
    b.wy += b.vy * dt; b.life -= b.dec;
  }
  G.bubbles = G.bubbles.filter(function(b){ return b.life > 0; });

  if (G.catchT > 0) G.catchT -= dt;

  // Phase logic
  if (G.phase === "casting") {
    G.bx = Math.max(20, Math.min(W-20, G.bx + G.mdir * 160 * dt));
    G.depth += SINK * dt;
    G.camDep = Math.max(0, hookWY() - (H * HRAT - G.waterY));
    G.maxDep = Math.max(G.maxDep, G.depth);
    if (Math.random() < 0.1) addBubbles(G.bx, hookWY());
    checkHit();
    G.score += G.depth * dt * 0.005;
    if (G.depth > 7000) G.phase = "reeling";

  } else if (G.phase === "reeling") {
    G.bx = Math.max(20, Math.min(W-20, G.bx + G.mdir * 120 * dt));
    G.depth = Math.max(0, G.depth - REEL * dt);
    var tgt = Math.max(0, hookWY() - (H * HRAT - G.waterY));
    G.camDep += (tgt - G.camDep) * Math.min(1, dt * 4);
    checkHit();
    if (G.depth <= 0) {
      G.depth = 0; G.camDep = 0; G.phase = "idle";
      G.bx = G.boatX + 42;
    }
  }

  updateHUD();
}

// ---- RENDER ----
function render() {
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawWater();
  drawBubbles();
  drawFishes();
  drawParticles();
  drawBoat();
}

// ---- LOOP ----
var last = 0;
function loop(ts) {
  var dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ---- INPUT ----
function cast() {
  if (G.phase === "idle") {
    G.phase = "casting";
    G.score = 0;  // reset score for this cast
    G.depth = 0; G.maxDep = 0;
    G.bx = G.boatX + 42;
    G.fishes = [];
    G.spawnT = 0;
    G.caught = {}; G.nCaught = 0;
    document.getElementById("sc").textContent = "0";
    document.getElementById("fc2").textContent = "0";
    document.getElementById("hint").style.opacity = "0";
  }
}

canvas.addEventListener("click", cast);
var txStart = null;
canvas.addEventListener("touchstart", function(e) {
  e.preventDefault();
  txStart = e.touches[0].clientX;
  cast();
}, {passive:false});
canvas.addEventListener("touchmove", function(e) {
  e.preventDefault();
  if (txStart === null) return;
  var dx = e.touches[0].clientX - txStart;
  G.mdir = dx > 8 ? 1 : dx < -8 ? -1 : 0;
}, {passive:false});
canvas.addEventListener("touchend", function(e) {
  e.preventDefault();
  txStart = null; G.mdir = 0;
}, {passive:false});

window.addEventListener("keydown", function(e) {
  if (e.key==="ArrowLeft"||e.key==="a") G.mdir=-1;
  if (e.key==="ArrowRight"||e.key==="d") G.mdir=1;
});
window.addEventListener("keyup", function(e) {
  if (["ArrowLeft","ArrowRight","a","d"].indexOf(e.key)>=0) G.mdir=0;
});

function hold(dir) { G.mdir = dir; }
function rel()     { G.mdir = 0; }
var bL = document.getElementById("bL"), bR = document.getElementById("bR");
bL.addEventListener("touchstart",function(e){e.preventDefault();hold(-1);},{passive:false});
bL.addEventListener("touchend",  function(e){e.preventDefault();rel();},{passive:false});
bR.addEventListener("touchstart",function(e){e.preventDefault();hold(1);},{passive:false});
bR.addEventListener("touchend",  function(e){e.preventDefault();rel();},{passive:false});
bL.addEventListener("mousedown",function(){hold(-1);}); bL.addEventListener("mouseup",rel);
bR.addEventListener("mousedown",function(){hold(1);}); bR.addEventListener("mouseup",rel);

// ---- COLLECTION ----
function buildCol() {
  var grid = document.getElementById("colGrid");
  grid.innerHTML = "";
  for (var i = 0; i < FISH.length; i++) {
    var fd = FISH[i];
    var got = !!G.caught[fd.id];
    var card = document.createElement("div");
    card.className = "fc" + (got?" got":"");
    var oc = document.createElement("canvas");
    oc.width = 56; oc.height = 44;
    var octx = oc.getContext("2d");
    if (got) {
      drawFish(octx, fd, 28, 22, Math.min(fd.sz*0.75,18), 1, Math.PI/10);
    } else {
      octx.fillStyle="#555"; octx.font="22px Arial"; octx.textAlign="center"; octx.textBaseline="middle";
      octx.fillText("?",28,22);
    }
    card.appendChild(oc);
    var n = document.createElement("div"); n.className="fn"; n.textContent = got?fd.name:"???"; card.appendChild(n);
    var p = document.createElement("div"); p.className="fp"; p.textContent = got?fd.pts+"pts":"~"+fd.dep+"m"; card.appendChild(p);
    grid.appendChild(card);
  }
  document.getElementById("colSub").textContent = G.nCaught + "/100 caught";
}

document.getElementById("colBtn").addEventListener("click", function() {
  buildCol();
  document.getElementById("colModal").classList.add("open");
});
document.getElementById("closeCol").addEventListener("click", function() {
  document.getElementById("colModal").classList.remove("open");
});

// ---- NEW GAME ----
function newGame() {
  G.score=0; G.depth=0; G.maxDep=0; G.camDep=0;
  G.hs=0; lsSet("dfhs", 0);
  G.phase="idle"; G.fishes=[]; G.parts=[]; G.bubbles=[];
  G.caught={}; G.nCaught=0; G.spawnT=0; G.mdir=0; G.catchT=0;
  document.getElementById("sc").textContent="0";
  document.getElementById("fc2").textContent="0";
  document.getElementById("hsv").textContent="0";
  document.getElementById("hint").style.opacity="1";
}
document.getElementById("ngBtn").addEventListener("click", newGame);

// ---- START ----
document.getElementById("startBtn").addEventListener("click", function() {
  document.getElementById("start").style.display = "none";
  document.getElementById("hsv").textContent = G.hs;
  G.waterY = H * WRAT;
  G.boatX  = W * 0.38;
  G.bx     = G.boatX + 42;
  requestAnimationFrame(loop);
});
</script>
